version: "3.9"

services:
  # ── Demand Forecasting API ──────────────────────────────────────────────────
  api:
    build: .
    container_name: demand-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro      # mount trained models (read-only)
      - ./mlruns:/app/mlruns         # persist MLflow runs
    environment:
      - MLFLOW_TRACKING_URI=mlruns
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - forecasting-net

  # ── MLflow Tracking UI ──────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: mlflow-ui
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    command: >
      mlflow server
      --backend-store-uri /mlflow/mlruns
      --default-artifact-root /mlflow/mlruns
      --host 0.0.0.0
      --port 5000
    networks:
      - forecasting-net

networks:
  forecasting-net:
    driver: bridge
