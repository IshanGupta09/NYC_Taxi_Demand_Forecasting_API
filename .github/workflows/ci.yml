name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: demand-forecasting-api
  PYTHON_VERSION: "3.11"

jobs:
  # ────────────────────────────────────────────────────
  # Job 1: Lint & Test
  # ────────────────────────────────────────────────────
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ api/ tracking/ tests/ --ignore E501

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────
  # Job 2: Build Docker image
  # ────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy model files for build test
        run: |
          mkdir -p models
          touch models/xgb_demand_model.pkl
          echo '{"top_zone_ids":[161]}' > models/model_meta.json

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Smoke test — container starts and /health returns 200
        run: |
          docker run -d --name api_test \
            -p 8000:8000 \
            ${{ env.IMAGE_NAME }}:latest
          sleep 8
          curl --fail http://localhost:8000/health
          docker stop api_test

  # ────────────────────────────────────────────────────
  # Job 3: Deploy to Render
  # ────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Validate deploy hook secret is set
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "❌ RENDER_DEPLOY_HOOK_URL secret is not set!"
            echo "Go to: GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: RENDER_DEPLOY_HOOK_URL"
            echo "Value: Your Render deploy hook URL (Render Dashboard → Service → Settings → Deploy Hooks)"
            exit 1
          fi
          echo "✅ Deploy hook secret is present."
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Trigger Render deploy hook
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/render_response.txt -w "%{http_code}" \
            -X POST "$RENDER_DEPLOY_HOOK_URL" \
            --max-time 30)

          echo "Response body:"
          cat /tmp/render_response.txt

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Deploy triggered successfully (HTTP $HTTP_STATUS)"
          else
            echo "❌ Deploy hook failed with HTTP $HTTP_STATUS"
            exit 1
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
